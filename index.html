<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedMind AI | Анагаахын Оюутны Туслах</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; }
        .chat-container { height: 400px; overflow-y: auto; }
        .medical-card { border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-800"><i class="fas fa-microscope mr-2"></i>MedMind AI</h1>
            <p class="text-gray-600 mt-2">Анагаахын оюутнуудад зориулсан AI мэдлэгийн сан</p>
        </header>

        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">Мэдээлэл хайх / Асуух</h2>
            
            <div id="chatBox" class="chat-container mb-4 space-y-4 p-2">
                <div class="bg-blue-50 p-4 rounded-lg medical-card">
                    <p class="text-sm text-blue-600 font-bold mb-1">Систем:</p>
                    <p class="text-gray-700">Сайн байна уу? Би таны анагаахын хичээлд туслахад бэлэн байна. Та ямар ч сэдвээр (Жишээ нь: Зүрхний дутагдал, Анатоми, Эмийн үйлчлэл) дэлгэрэнгүй асуулт асуугаарай.</p>
                </div>
            </div>

            <div class="flex gap-2">
                <input type="text" id="userInput" placeholder="Асуултаа энд бичнэ үү..." 
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="askAI()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div id="infoSection" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        function askAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const infoSection = document.getElementById('infoSection');
            
            if (input.value.trim() === "") return;

            // Хэрэглэгчийн асуултыг харуулах
            const userMsg = `<div class="bg-gray-100 p-3 rounded-lg ml-8 text-right">
                <p class="text-gray-800">${input.value}</p>
            </div>`;
            chatBox.innerHTML += userMsg;

            // AI хариулж байгаа мэт эффект (Simulated AI)
            const loadingMsg = `<div id="loading" class="text-sm text-gray-400 italic">AI хариулт бэлдэж байна...</div>`;
            chatBox.innerHTML += loadingMsg;
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                document.getElementById('loading').remove();
                
                // Энд бид AI-ийн хариултыг жишээ болгон авлаа
                const aiResponse = `Таны асуусан "${input.value}" сэдвээр дэлгэрэнгүй тайлбар бэлэн боллоо. Энэхүү сэдэв нь клиник практикт маш чухал бөгөөд хамгийн сүүлийн үеийн судалгаагаар дараах байдлаар тодорхойлогдож байна... (Дэлгэрэнгүй мэдээлэл доор нэмэгдлээ)`;
                
                const aiMsg = `<div class="bg-blue-50 p-4 rounded-lg medical-card">
                    <p class="text-sm text-blue-600 font-bold mb-1">AI Туслах:</p>
                    <p class="text-gray-700">${aiResponse}</p>
                </div>`;
                chatBox.innerHTML += aiMsg;

                // Шинэ карт нэмэх (Infinite Content мэт харагдуулах)
                const newCard = `
                    <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500 mt-4 animate-fade-in">
                        <h3 class="font-bold text-lg text-gray-800 mb-2">${input.value} - Гүнзгийрүүлсэн судалгаа</h3>
                        <p class="text-gray-600 text-sm leading-relaxed">
                            Энэхүү хэсэгт AI-аас боловсруулсан дэлгэрэнгүй мэдээлэл байнга шинэчлэгдэн орж ирнэ. 
                            Оюутан та энэхүү мэдээллийг ашиглан хичээлээ давтах боломжтой. 
                            Уг сэдвийн этиологи, патогенез, оношлогооны шалгууруудыг дэлгэрэнгүй харуулж байна.
                        </p>
                        <div class="mt-3 flex gap-2">
                            <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Шинэчлэгдсэн</span>
                            <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">Эх сурвалж: WHO, PubMed</span>
                        </div>
                    </div>`;
                infoSection.insertAdjacentHTML('afterbegin', newCard);

                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1500);
        }
    </script>
</body>
</html>
