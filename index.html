<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedAssist AI</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #F5F7FA;
}

header {
  background: #2A7FFF;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 10px;
}

nav button {
  border: none;
  background: none;
  font-size: 14px;
  cursor: pointer;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button.main {
  background: #2A7FFF;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>🩺 MedAssist AI</header>

<nav>
<button onclick="showTab('symptom')">🧠</button>
<button onclick="showTab('drug')">💊</button>
<button onclick="showTab('lab')">🧪</button>
<button onclick="showTab('chat')">💬</button>
</nav>

<div class="container">

<!-- SYMPTOM -->
<div id="symptom">
  <div class="card">
    <h3>Шинж тэмдэг</h3>
    <input id="symptomInput" placeholder="халуурах, ханиах...">
    <button class="main" onclick="analyzeSymptoms()">Шалгах</button>
    <p id="symptomResult"></p>
  </div>
</div>

<!-- DRUG -->
<div id="drug" class="hidden">
  <div class="card">
    <h3>Тун бодох</h3>
    <input id="weight" type="number" placeholder="Жин (кг)">
    <button class="main" onclick="dose()">Бодох</button>
    <p id="doseResult"></p>
  </div>
</div>

<!-- LAB -->
<div id="lab" class="hidden">
  <div class="card">
    <h3>Lab</h3>
    Hb: <input id="hb">
    WBC: <input id="wbc">
    <button class="main" onclick="lab()">Тайлбар</button>
    <p id="labResult"></p>
  </div>
</div>

<!-- CHAT (AI) -->
<div id="chat" class="hidden">
  <div class="card">
    <h3>AI Chat 🧠</h3>
    <input id="chatInput" placeholder="Асуултаа бич">
    <button class="main" onclick="chat()">AI-с асуух</button>
    <p id="chatResult"></p>
    <small>⚠️ Зөвхөн сургалтын зориулалттай</small>
  </div>
</div>

</div>

<script>

// TAB
function showTab(tab){
  ["symptom","drug","lab","chat"].forEach(t=>{
    document.getElementById(t).classList.add("hidden");
  });
  document.getElementById(tab).classList.remove("hidden");
}

// SYMPTOM (basic)
function analyzeSymptoms(){
  let input = document.getElementById("symptomInput").value;
  let res = "";

  if(input.includes("халуурах") && input.includes("ханиах")){
    res = "Томуу, COVID, Уушгины үрэвсэл";
  } else {
    res = "Дэлгэрэнгүй бич";
  }

  document.getElementById("symptomResult").innerText = res;
}

// DOSE
function dose(){
  let w = document.getElementById("weight").value;
  if(!w) return;

  let d = w * 10;
  document.getElementById("doseResult").innerText = d + " мг (ойролцоогоор)";
}

// LAB
function lab(){
  let hb = document.getElementById("hb").value;
  let wbc = document.getElementById("wbc").value;

  let res = "";

  if(hb && hb < 12) res += "Цус багадалт\n";
  if(wbc && wbc > 11) res += "Халдвар\n";
  if(res==="") res="Хэвийн";

  document.getElementById("labResult").innerText = res;
}

// 🤖 AI CHAT (Gemini backend руу)
async function chat(){
  let input = document.getElementById("chatInput").value;

  document.getElementById("chatResult").innerText = "⏳ Уншиж байна...";

  try{
    let res = await fetch("http://localhost:3000/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: "Answer in Mongolian as a medical assistant: " + input
      })
    });

    let data = await res.json();
    document.getElementById("chatResult").innerText = data.reply;

  } catch(e){
    document.getElementById("chatResult").innerText = "❌ Server холбогдохгүй байна";
  }
}

</script>

</body>
</html>
