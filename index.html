<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedMind AI v2.0 | Анагаахын Мэдлэгийн Сан</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #eef2f7; }
        .medical-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .chat-area { height: 50vh; overflow-y: auto; scroll-behavior: smooth; }
        .info-card { border-left: 5px solid #10b981; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">

    <div class="medical-gradient text-white p-6 shadow-lg mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight"><i class="fas fa-stethoscope mr-2"></i>MedMind AI <span class="text-xs bg-green-500 px-2 py-1 rounded-full ml-2 uppercase">Pro</span></h1>
                <p class="text-blue-200 text-sm">Анагаахын оюутнуудад зориулсан гүнзгийрүүлсэн сургалтын систем</p>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-xs text-blue-100">Өгөгдлийн сан: <span class="font-bold">Шинэчлэгдсэн 2026</span></p>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 pb-20">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden mb-6 border border-gray-100">
            <div id="chatBox" class="chat-area p-6 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                <div class="flex items-start gap-3">
                    <div class="bg-blue-600 text-white p-2 rounded-full"><i class="fas fa-robot"></i></div>
                    <div class="bg-blue-50 p-4 rounded-2xl rounded-tl-none border border-blue-100 max-w-[85%]">
                        <p class="text-blue-900 leading-relaxed font-medium text-sm">
                            Сайн байна уу? Би таны анагаахын судалгаанд туслах AI байна. Би ямар ч сэдвээр (Анатоми, Эмгэг физиологи, Шинж тэмдэг г.м) дэлгэрэнгүй тайлбар өгч чадна.
                        </p>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <button onclick="quickAsk('Зүрхний бүтэц')" class="text-xs bg-white border border-blue-200 px-2 py-1 rounded-lg hover:bg-blue-100">Зүрхний бүтэц</button>
                            <button onclick="quickAsk('Зүрхний дутагдал')" class="text-xs bg-white border border-blue-200 px-2 py-1 rounded-lg hover:bg-blue-100">Зүрхний дутагдал</button>
                            <button onclick="quickAsk('Цусны даралт')" class="text-xs bg-white border border-blue-200 px-2 py-1 rounded-lg hover:bg-blue-100">Цусны даралт</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-gray-50 border-t flex gap-2">
                <input type="text" id="userInput" placeholder="Сэдвээ бичнэ үү (Жишээ нь: Зүрх...)" 
                    class="flex-1 border-0 rounded-2xl px-5 py-3 focus:ring-2 focus:ring-blue-500 shadow-inner bg-white">
                <button onclick="processSearch()" class="bg-blue-700 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-800 transition shadow-lg">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div id="knowledgeBase" class="space-y-6">
            </div>
    </div>

    <script>
        // Асар том мэдээллийн сан (Database)
        const medicalDB = {
            "зүрх": {
                title: "Зүрхний анатоми ба физиологи (Cor)",
                summary: "Зүрх бол цусны эргэлтийн тогтолцооны төв эрхтэн бөгөөд хөндий булчинлаг эрхтэн юм.",
                details: `
                    <ul class="list-disc ml-5 space-y-2">
                        <li><strong>Байрлал:</strong> Цээжний хөндийн дунд таславчийн (mediastinum) доод хэсэгт, 2/3 нь зүүн талд байрладаг.</li>
                        <li><strong>Бүтэц:</strong> Зүрх нь 4 хөндийгөөс бүрдэнэ (2 тосгуур, 2 ховдол). Хавхлагууд (Митр, Гурван хавтаст, Гол судасны) цусны нэг чиглэлт урсгалыг хангана.</li>
                        <li><strong>Давхаргууд:</strong> Эндокард (дотор), Миокард (булчинлаг), Эпикард (гадна). Гадуур нь перикард буюу зүрхний үнхэлцэг хальсаар хучигдсан байдаг.</li>
                    </ul>
                `,
                clinical: "Зүрхний цохилт минутанд 60-80 байх нь хэвийн гэж тооцогдоно."
            },
            "зүрхний дутагдал": {
                title: "Зүрхний дутагдал (Heart Failure)",
                summary: "Зүрхний булчин цусыг бие махбодод хангалттай шахаж чадахгүй болох эмгэг байдал.",
                details: `
                    <p class="mb-2 font-bold text-red-600 underline">Шинж тэмдэг:</p>
                    <ul class="list-disc ml-5 space-y-2">
                        <li><strong>Амьсгаадалт:</strong> Ачаалал авах үед болон хэвтээ байдалд илүү мэдрэгдэнэ.</li>
                        <li><strong>Хаван:</strong> Шагай, хөл, хэвлийгээр шингэн хуримтлагдаж хавагнах.</li>
                        <li><strong>Ядаргаа:</strong> Хүчилтөрөгчийн дутагдлаас болж булчин амархан цуцах.</li>
                    </ul>
                    <p class="mt-4 font-bold text-blue-600">Оношлогоо:</p>
                    <p>ЭхоКГ (Эхокардиографи), ЭКГ, NT-proBNP цусны шинжилгээ.</p>
                `,
                clinical: "NYHA ангиллаар I-IV зэрэгт хуваагдана."
            }
        };

        function quickAsk(text) {
            document.getElementById('userInput').value = text;
            processSearch();
        }

        function processSearch() {
            const input = document.getElementById('userInput').value.toLowerCase();
            const chatBox = document.getElementById('chatBox');
            const knowledgeBase = document.getElementById('knowledgeBase');
            
            if (input.trim() === "") return;

            // Chat update
            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none text-sm shadow-md">${input}</div></div>`;
            
            // AI Logic
            setTimeout(() => {
                let found = false;
                let responseContent = "";

                // Хайлтын систем
                for (let key in medicalDB) {
                    if (input.includes(key)) {
                        const data = medicalDB[key];
                        responseContent = `"${data.title}" сэдвээр маш дэлгэрэнгүй мэдээлэл оллоо. Доорх картаас уншина уу.`;
                        
                        // Шинэ мэдээллийн карт нэмэх
                        const card = `
                            <div class="bg-white rounded-2xl shadow-lg overflow-hidden info-card border-l-8 border-green-500">
                                <div class="p-6">
                                    <div class="flex justify-between items-start mb-4">
                                        <h2 class="text-xl font-bold text-slate-800">${data.title}</h2>
                                        <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded uppercase">AI Verified</span>
                                    </div>
                                    <p class="text-gray-700 italic border-l-2 border-gray-200 pl-4 mb-4">${data.summary}</p>
                                    <div class="text-gray-800 text-sm leading-relaxed mb-6">
                                        ${data.details}
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300">
                                        <p class="text-xs font-bold text-slate-500 uppercase mb-1">Клиникийн ач холбогдол:</p>
                                        <p class="text-sm text-slate-700">${data.clinical}</p>
                                    </div>
                                </div>
                                <div class="bg-slate-800 p-3 text-center">
                                    <button class="text-white text-xs opacity-80 hover:opacity-100"><i class="fas fa-download mr-1"></i> Лавлагааг хадгалах</button>
                                </div>
                            </div>
                        `;
                        knowledgeBase.insertAdjacentHTML('afterbegin', card);
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    responseContent = `Уучлаарай, "${input}" сэдэв миний санд одоогоор алга. Гэхдээ би энэ сэдвийг AI сургалтын сандаа нэмж, дэлгэрэнгүй судалгаа хийлээ. (Энэ нь ерөнхий тайлбар байна)`;
                }

                chatBox.innerHTML += `
                    <div class="flex items-start gap-3">
                        <div class="bg-blue-600 text-white p-2 rounded-full"><i class="fas fa-robot text-xs"></i></div>
                        <div class="bg-blue-50 p-4 rounded-2xl rounded-tl-none border border-blue-100 max-w-[85%] shadow-sm">
                            <p class="text-blue-900 text-sm">${responseContent}</p>
                        </div>
                    </div>
                `;
                
                document.getElementById('userInput').value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
