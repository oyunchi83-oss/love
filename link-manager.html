<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Миний Линкүүд</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      color: #e8e8f0;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* Header */
    .header { margin-bottom: 40px; }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #13131f;
      border: 1px solid #1e1e30;
      border-radius: 100px;
      padding: 4px 12px 4px 8px;
      font-size: 11px;
      color: #7c6af7;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7c6af7;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    h1 {
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 600;
      color: #f0f0fa;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    h1 span { color: #7c6af7; }
    .subtitle {
      font-size: 14px;
      color: #555570;
      margin-top: 8px;
    }

    /* Card */
    .card {
      background: #0f0f1a;
      border: 1px solid #1a1a28;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .field-group { display: flex; flex-direction: column; gap: 10px; }

    .field-label {
      font-size: 11px;
      font-weight: 500;
      color: #44445a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
      margin-bottom: 4px;
      display: block;
    }

    input {
      width: 100%;
      background: #07070f;
      border: 1px solid #1a1a28;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: #e0e0f0;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input::placeholder { color: #2e2e42; }
    input:focus {
      border-color: #7c6af7;
      box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.1);
    }

    .add-btn {
      width: 100%;
      margin-top: 6px;
      padding: 13px;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }
    .add-btn:hover {
      background: #9082f9;
      box-shadow: 0 4px 20px rgba(124, 106, 247, 0.3);
    }
    .add-btn:active { transform: scale(0.98); }

    .error-msg {
      font-size: 12px;
      color: #f06a6a;
      padding: 8px 12px;
      background: rgba(240, 106, 106, 0.08);
      border-radius: 8px;
      border: 1px solid rgba(240, 106, 106, 0.15);
      display: none;
    }
    .error-msg.visible { display: block; }

    /* List section */
    .list-section { display: none; }
    .list-section.visible { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 500;
      color: #44445a;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .count-badge {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: #7c6af7;
      background: rgba(124, 106, 247, 0.1);
      border: 1px solid rgba(124, 106, 247, 0.2);
      padding: 2px 8px;
      border-radius: 100px;
    }

    .search-wrap { margin-bottom: 14px; display: none; }
    .search-wrap.visible { display: block; }
    .search-wrap input { padding: 10px 14px; font-size: 13px; }

    .link-list { display: flex; flex-direction: column; gap: 8px; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #07070f;
      border: 1px solid #1a1a28;
      border-radius: 12px;
      padding: 12px 14px;
      transition: border-color 0.2s, opacity 0.35s, transform 0.35s;
      animation: fadeIn 0.3s ease;
    }
    .link-item:hover { border-color: #2a2a3e; }
    .link-item.deleting { opacity: 0; transform: translateX(20px); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .favicon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: #13131f;
      border: 1px solid #1e1e30;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .favicon img { width: 18px; height: 18px; object-fit: contain; }
    .favicon-dot { width: 10px; height: 10px; border-radius: 50%; background: #2a2a42; display: none; }

    .link-info { flex: 1; min-width: 0; }
    .link-title {
      font-size: 14px;
      font-weight: 500;
      color: #d8d8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-domain {
      font-size: 11px;
      color: #383850;
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid #1a1a28;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #383850;
    }
    .icon-btn.open-btn:hover {
      background: rgba(124, 106, 247, 0.1);
      border-color: rgba(124, 106, 247, 0.3);
      color: #7c6af7;
    }
    .icon-btn.del-btn:hover {
      background: rgba(240, 106, 106, 0.1);
      border-color: rgba(240, 106, 106, 0.3);
      color: #f06a6a;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 10px; }
    .empty-text { font-size: 13px; color: #2e2e46; line-height: 1.6; }

    .no-results {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #2e2e46;
      display: none;
    }
    .no-results.visible { display: block; }

    @media (max-width: 480px) {
      .container { padding: 32px 16px 60px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-badge">
        <div class="dot"></div>
        Personal Links
      </div>
      <h1>Миний <span>Линкүүд</span></h1>
      <p class="subtitle">Хэрэгтэй хаягуудаа нэг дороо хадгалаарай</p>
    </div>

    <!-- Add Form -->
    <div class="card">
      <div class="field-group">
        <div>
          <label class="field-label" for="inp-title">Нэр</label>
          <input id="inp-title" type="text" placeholder="жишээ нь: GitHub, Notion..." maxlength="80" autocomplete="off" />
        </div>
        <div>
          <label class="field-label" for="inp-url">URL хаяг</label>
          <input id="inp-url" type="url" placeholder="https://example.com" maxlength="500" autocomplete="off" autocapitalize="none" inputmode="url" />
        </div>
        <div id="error-msg" class="error-msg"></div>
        <button class="add-btn" id="add-btn">+ Нэмэх</button>
      </div>
    </div>

    <!-- Links List Section -->
    <div class="list-section" id="list-section">
      <div class="section-header">
        <span class="section-title">Хадгалсан линкүүд</span>
        <span class="count-badge" id="count-badge">0</span>
      </div>
      <div class="search-wrap" id="search-wrap">
        <input id="search-inp" type="text" placeholder="Хайх..." autocomplete="off" />
      </div>
      <div class="link-list" id="link-list"></div>
      <div class="no-results" id="no-results">Хайлтад тохирох линк олдсонгүй</div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <p class="empty-text">Одоогоор хадгалсан линк байхгүй байна.<br />Дээрх хэсэгт нэмэх товч дарж эхлээрэй!</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'personal-links-v1';

    // State
    let links = [];
    let searchQuery = '';

    // DOM refs
    const inpTitle   = document.getElementById('inp-title');
    const inpUrl     = document.getElementById('inp-url');
    const addBtn     = document.getElementById('add-btn');
    const errorMsg   = document.getElementById('error-msg');
    const listSection= document.getElementById('list-section');
    const linkList   = document.getElementById('link-list');
    const countBadge = document.getElementById('count-badge');
    const searchWrap = document.getElementById('search-wrap');
    const searchInp  = document.getElementById('search-inp');
    const emptyState = document.getElementById('empty-state');
    const noResults  = document.getElementById('no-results');

    // Load from localStorage
    function loadLinks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) links = JSON.parse(raw);
      } catch(_) { links = []; }
      render();
    }

    // Save to localStorage
    function saveLinks() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(links)); } catch(_) {}
    }

    // Helpers
    function getDomain(url) {
      try { return new URL(url).hostname.replace('www.', ''); } catch { return url; }
    }
    function getFavicon(url) {
      try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch { return ''; }
    }
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }
    function clearError() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
    }

    // Render
    function render() {
      const filtered = links.filter(l =>
        l.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        l.url.toLowerCase().includes(searchQuery.toLowerCase())
      );

      countBadge.textContent = links.length;

      if (links.length === 0) {
        listSection.classList.remove('visible');
        emptyState.style.display = 'block';
      } else {
        listSection.classList.add('visible');
        emptyState.style.display = 'none';
      }

      // Search bar: show when >= 3 links
      if (links.length >= 3) {
        searchWrap.classList.add('visible');
      } else {
        searchWrap.classList.remove('visible');
        searchQuery = '';
        searchInp.value = '';
      }

      // No results
      if (filtered.length === 0 && links.length > 0) {
        noResults.classList.add('visible');
      } else {
        noResults.classList.remove('visible');
      }

      // Build list
      linkList.innerHTML = '';
      filtered.forEach(link => {
        const item = document.createElement('div');
        item.className = 'link-item';
        item.dataset.id = link.id;

        const faviconSrc = getFavicon(link.url);
        const domain = getDomain(link.url);

        item.innerHTML = `
          <div class="favicon">
            <img src="${faviconSrc}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
            <div class="favicon-dot"></div>
          </div>
          <div class="link-info">
            <div class="link-title">${escapeHtml(link.title)}</div>
            <div class="link-domain">${escapeHtml(domain)}</div>
          </div>
          <div class="link-actions">
            <button class="icon-btn open-btn" title="Нээх" data-url="${escapeHtml(link.url)}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>
            <button class="icon-btn del-btn" title="Устгах" data-id="${link.id}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        `;

        linkList.appendChild(item);
      });

      // Button events
      linkList.querySelectorAll('.open-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          window.open(btn.dataset.url, '_blank', 'noopener');
        });
      });
      linkList.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteLink(Number(btn.dataset.id)));
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Add link
    function handleAdd() {
      clearError();
      const title = inpTitle.value.trim();
      const url   = inpUrl.value.trim();

      if (!title) { showError('Линкний нэрийг оруулна уу.'); inpTitle.focus(); return; }
      if (!url)   { showError('URL хаягийг оруулна уу.'); inpUrl.focus(); return; }

      let finalUrl = url;
      if (!/^https?:\/\//i.test(url)) finalUrl = 'https://' + url;
      try { new URL(finalUrl); } catch { showError('URL хаяг буруу байна.'); inpUrl.focus(); return; }

      const newLink = { id: Date.now(), title, url: finalUrl, createdAt: new Date().toISOString() };
      links.unshift(newLink);
      saveLinks();

      inpTitle.value = '';
      inpUrl.value = '';
      inpTitle.focus();

      render();

      // Flash new item
      const newItem = linkList.querySelector(`[data-id="${newLink.id}"]`);
      if (newItem) {
        newItem.style.borderColor = 'rgba(124, 106, 247, 0.4)';
        setTimeout(() => { newItem.style.borderColor = ''; }, 1500);
      }
    }

    // Delete link
    function deleteLink(id) {
      const item = linkList.querySelector(`[data-id="${id}"]`);
      if (item) {
        item.classList.add('deleting');
        setTimeout(() => {
          links = links.filter(l => l.id !== id);
          saveLinks();
          render();
        }, 350);
      }
    }

    // Event listeners
    addBtn.addEventListener('click', handleAdd);
    inpTitle.addEventListener('keydown', e => { if (e.key === 'Enter') handleAdd(); });
    inpUrl.addEventListener('keydown', e => { if (e.key === 'Enter') handleAdd(); });
    searchInp.addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    // Init
    loadLinks();
  </script>
</body>
</html>
